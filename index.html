<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafaela Marzano · Criadora de Conteúdo UGC</title>
<meta name="description" content="Rafaela Marzano, criadora de conteúdo UGC. Vídeos e fotos de produto que ajudam marcas a vender com autenticidade.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ==========================================================
     TOKENS DE DESIGN
     Paleta editorial: creme, tinta quase preta, azul royal e
     laranja queimado. Ajuste aqui se quiser recolorir o site.
     ========================================================== */
  :root{
    --creme: #f3eee9;
    --creme-carta: #eae2d6;
    --tinta: #14110d;
    --tinta-suave: #4a453d;
    --royal: #0049a4;
    --royal-escuro: #003172;
    --queimado: #8e1825;
    --linha: rgba(20, 17, 13, 0.12);
    --branco: #fffdfa;
    --azul-claro: #dbe9fb;
    --azul-claro-borda: #b7d4f5;
    --verde-suave: #6f7a3f;

    --serif: "Fraunces", serif;
    --sans: "Plus Jakarta Sans", sans-serif;

    --largura-max: 1180px;
    --raio: 18px;
    --raio-pequeno: 10px;
    --sombra: 0 18px 40px -20px rgba(20, 17, 13, 0.35);
    --transicao: 0.35s cubic-bezier(.22,.61,.36,1);
  }

  *, *::before, *::after{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  body{
    margin: 0;
    background: var(--creme);
    color: var(--tinta);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  img, svg{ max-width: 100%; display: block; }

  a{ color: inherit; text-decoration: none; }

  ul{ margin: 0; padding: 0; list-style: none; }

  h1, h2, h3, h4{
    font-family: var(--serif);
    font-weight: 500;
    line-height: 1.08;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--queimado);
  }

  em{
    font-style: italic;
    color: var(--royal);
  }

  p{ margin: 0; }

  .container{
    width: 100%;
    max-width: var(--largura-max);
    margin: 0 auto;
    padding: 0 24px;
  }

  section{ padding: 136px 0; position: relative; }
  #contato{ padding-top: 176px; }

  .eyebrow{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--royal-escuro);
    margin-bottom: 22px;
  }
  .eyebrow::before{
    content: "";
    width: 26px;
    height: 1.5px;
    background: var(--queimado);
    display: inline-block;
  }

  .titulo-secao{
    font-size: clamp(2rem, 4.2vw, 3rem);
    max-width: 720px;
    margin-bottom: 24px;
  }

  .texto-secao{
    max-width: 560px;
    color: var(--tinta-suave);
    font-size: 1.05rem;
  }

  .cabecalho-secao{
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 32px;
    margin-bottom: 68px;
    flex-wrap: wrap;
  }

  /* Foco visível para navegação por teclado */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible{
    outline: 2.5px solid var(--royal);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .botao{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 15px 28px;
    border-radius: 100px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.95rem;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform var(--transicao), background var(--transicao), color var(--transicao), border-color var(--transicao);
  }
  .botao:hover{ transform: translateY(-2px); }

  .botao-primario{
    background: var(--tinta);
    color: var(--creme);
  }
  .botao-primario:hover{ background: var(--royal); }

  .botao-secundario{
    background: transparent;
    color: var(--tinta);
    border-color: var(--tinta);
  }
  .botao-secundario:hover{
    background: var(--tinta);
    color: var(--creme);
  }

  .botao-contorno-claro{
    background: transparent;
    color: var(--branco);
    border-color: rgba(255,255,255,0.5);
  }
  .botao-contorno-claro:hover{
    background: var(--branco);
    color: var(--tinta);
  }

  /* ==========================================================
     ANIMAÇÃO DE ENTRADA (scroll reveal)
     ========================================================== */
  .revelar{
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.8s cubic-bezier(.22,.61,.36,1), transform 0.8s cubic-bezier(.22,.61,.36,1);
  }
  .revelar.visivel{
    opacity: 1;
    transform: translateY(0);
  }
  .revelar-atraso-1{ transition-delay: 0.1s; }
  .revelar-atraso-2{ transition-delay: 0.2s; }
  .revelar-atraso-3{ transition-delay: 0.3s; }
  .revelar-atraso-4{ transition-delay: 0.4s; }

  /* ==========================================================
     1. CABEÇALHO / MENU
     ========================================================== */
  .cabecalho{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    background: rgba(243, 238, 233, 0.82);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--linha);
  }

  .barra-nav{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    max-width: var(--largura-max);
    margin: 0 auto;
  }

  .marca-logo{
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .marca-logo em{ color: var(--queimado); }

  .nav-links{
    display: flex;
    align-items: center;
    gap: 34px;
  }

  .nav-links a{
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--tinta);
    position: relative;
    padding: 4px 0;
  }
  .nav-links a::after{
    content: "";
    position: absolute;
    left: 0; bottom: -2px;
    width: 0%;
    height: 2px;
    background: var(--queimado);
    transition: width var(--transicao);
  }
  .nav-links a:hover::after,
  .nav-links a:focus-visible::after{ width: 100%; }

  .nav-cta{
    background: var(--tinta);
    color: var(--creme) !important;
    padding: 11px 22px;
    border-radius: 100px;
    font-size: 0.88rem !important;
  }
  .nav-cta::after{ display: none; }
  .nav-cta:hover{ background: var(--royal) !important; }

  .nav-links > li{ display: flex; align-items: center; }

  .idioma-toggle{
    display: flex;
    gap: 6px;
  }
  .idioma-btn{
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 7px 13px;
    border-radius: 100px;
    border: 1.5px solid var(--linha);
    background: transparent;
    color: var(--tinta-suave);
    cursor: pointer;
    transition: all var(--transicao);
  }
  .idioma-btn:hover{ border-color: var(--tinta); color: var(--tinta); }
  .idioma-btn.ativo{
    background: var(--tinta);
    border-color: var(--tinta);
    color: var(--creme);
  }

  .botao-menu{
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    flex-direction: column;
    gap: 5px;
  }
  .botao-menu span{
    width: 24px;
    height: 2px;
    background: var(--tinta);
    display: block;
    transition: transform var(--transicao), opacity var(--transicao);
  }
  .botao-menu[aria-expanded="true"] span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .botao-menu[aria-expanded="true"] span:nth-child(2){ opacity: 0; }
  .botao-menu[aria-expanded="true"] span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

  /* ==========================================================
     2. HERO
     ========================================================== */
  .hero{
    padding: 168px 0 96px;
    overflow: hidden;
  }

  .hero-grade{
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 56px;
    align-items: center;
  }

  .hero-titulo{
    font-size: clamp(2.6rem, 6vw, 4.4rem);
    margin-bottom: 26px;
  }

  .hero-sub{
    font-size: 1.15rem;
    color: var(--tinta-suave);
    max-width: 480px;
    margin-bottom: 38px;
  }

  .hero-acoes{
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .hero-foto{
    position: relative;
    aspect-ratio: 4/5;
    border-radius: var(--raio);
    /* EDITE AQUI: bloco simulando a foto principal da Rafaela.
       Para usar uma foto real, troque a div .hero-foto por:
       <img src="sua-foto.jpg" alt="Rafaela Marzano, criadora de conteúdo UGC" style="width:100%;height:100%;object-fit:cover;border-radius:var(--raio);"> */
    background: linear-gradient(155deg, var(--royal) 0%, var(--royal-escuro) 42%, var(--tinta) 78%, var(--queimado) 130%);
    box-shadow: var(--sombra);
    overflow: hidden;
  }
  .hero-foto::before{
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.22), transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(142,24,37,0.35), transparent 50%);
  }
  .hero-foto-foto{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .hero-foto-legenda{
    position: absolute;
    bottom: 20px; left: 20px; right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--branco);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 1px 6px rgba(20,17,13,0.65);
  }
  .hero-foto-ponto{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--queimado);
    display: inline-block;
    margin-right: 8px;
  }

  /* ==========================================================
     3. SOBRE
     ========================================================== */
  .sobre-grade{
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    gap: 64px;
    align-items: center;
  }

  .sobre-foto{
    aspect-ratio: 3/4;
    border-radius: var(--raio);
    background: linear-gradient(200deg, var(--queimado) 0%, #d98a90 35%, var(--creme-carta) 70%, var(--royal) 130%);
    box-shadow: var(--sombra);
    position: relative;
    overflow: hidden;
  }
  .sobre-foto-foto{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .sobre-destaques{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 28px 0 32px;
  }
  .destaque-item{
    background: var(--creme-carta);
    border: 1px solid var(--linha);
    border-radius: var(--raio-pequeno);
    padding: 18px 14px;
    text-align: center;
  }
  .destaque-valor{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--tinta);
    margin-bottom: 4px;
    line-height: 1.1;
  }
  .destaque-rotulo{
    font-size: 0.76rem;
    color: var(--tinta-suave);
  }

  .sobre-texto p{
    color: var(--tinta-suave);
    font-size: 1.05rem;
    margin-bottom: 18px;
  }
  .sobre-texto p:last-child{ margin-bottom: 0; }

  .sobre-lista{
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 24px;
  }
  .sobre-lista li{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.92rem;
    color: var(--tinta);
    font-weight: 500;
  }
  .sobre-lista li::before{
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--queimado);
    margin-top: 8px;
    flex-shrink: 0;
  }

  /* ==========================================================
     4 e 5. PORTFÓLIO DE VÍDEOS E DE FOTOS
     ========================================================== */
  .filtros{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 40px;
  }
  .filtro-botao{
    background: transparent;
    border: 1.5px solid var(--linha);
    color: var(--tinta-suave);
    padding: 10px 20px;
    border-radius: 100px;
    font-family: var(--sans);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transicao);
  }
  .filtro-botao:hover{
    border-color: var(--tinta);
    color: var(--tinta);
  }
  .filtro-botao.ativo{
    background: var(--tinta);
    border-color: var(--tinta);
    color: var(--creme);
  }

  .grade-portfolio{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }

  .cartao-trabalho{
    display: block;
    border-radius: var(--raio);
    overflow: hidden;
    background: var(--creme-carta);
    box-shadow: var(--sombra);
    transition: transform var(--transicao), opacity var(--transicao);
  }
  .cartao-trabalho.oculto{
    display: none;
  }
  .cartao-trabalho:hover{ transform: translateY(-6px); }

  .cartao-trabalho-imagem{
    aspect-ratio: 9/16;
    position: relative;
  }
  .cartao-trabalho-imagem.imagem-foto{
    aspect-ratio: 1/1;
  }
  .cartao-trabalho-foto{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .cartao-trabalho-video{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .cartao-trabalho-legenda{
    padding: 16px 18px 18px;
  }
  .cartao-trabalho-link-externo{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--royal);
  }
  .cartao-trabalho-link-externo:hover{
    color: var(--royal-escuro);
    text-decoration: underline;
  }
  .cartao-trabalho-tag{
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(6px);
    color: var(--branco);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    position: absolute;
    top: 18px;
    left: 18px;
  }
  .cartao-trabalho-titulo{
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--tinta);
    margin-bottom: 8px;
  }

  /* ==========================================================
     6. SERVIÇOS
     ========================================================== */
  .grade-servicos{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }
  .cartao-servico{
    background: var(--branco);
    border: 1px solid var(--linha);
    border-radius: var(--raio);
    padding: 34px 26px;
    transition: transform var(--transicao), box-shadow var(--transicao), border-color var(--transicao);
  }
  .cartao-servico:hover{
    transform: translateY(-6px);
    box-shadow: var(--sombra);
    border-color: transparent;
  }
  .cartao-servico-numero{
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    color: var(--queimado);
    margin-bottom: 20px;
    display: block;
  }
  .cartao-servico h3{
    font-size: 1.25rem;
    margin-bottom: 12px;
  }
  .cartao-servico p{
    color: var(--tinta-suave);
    font-size: 0.94rem;
    margin-bottom: 16px;
  }
  .cartao-servico-tag{
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 13px;
    border-radius: 100px;
    border: 1px solid var(--linha);
    color: var(--tinta-suave);
  }
  .cartao-servico.destaque{
    background: var(--tinta);
    border-color: var(--tinta);
  }
  .cartao-servico.destaque h3{ color: var(--creme); }
  .cartao-servico.destaque p{ color: rgba(243,238,233,0.78); }
  .cartao-servico.destaque .cartao-servico-numero{ color: var(--queimado); }
  .cartao-servico.destaque .cartao-servico-tag{
    border-color: rgba(243,238,233,0.35);
    color: var(--creme);
  }

  /* ==========================================================
     7. CONTATO
     ========================================================== */
  .contato-janela{
    background: var(--branco);
    border-radius: var(--raio);
    box-shadow: var(--sombra);
    overflow: hidden;
  }
  .contato-janela-barra{
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 26px;
    background: var(--creme-carta);
    border-bottom: 1px solid var(--linha);
  }
  .contato-janela-pontos{ display: flex; gap: 7px; flex-shrink: 0; }
  .contato-janela-pontos span{
    width: 10px; height: 10px;
    border-radius: 50%;
    display: block;
  }
  .contato-janela-pontos span:nth-child(1){ background: var(--queimado); }
  .contato-janela-pontos span:nth-child(2){ background: var(--royal); }
  .contato-janela-pontos span:nth-child(3){ background: var(--verde-suave); }
  .contato-janela-nome{
    font-family: var(--sans);
    font-size: 0.82rem;
    color: var(--tinta-suave);
    letter-spacing: 0.01em;
  }
  .contato-janela-status{
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--tinta-suave);
    white-space: nowrap;
  }

  .contato-janela-corpo{
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 56px;
    padding: 48px;
  }

  .contato-info-lista{
    display: flex;
    flex-direction: column;
    margin-top: 4px;
  }
  .contato-info-linha{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 16px 0;
    border-bottom: 1px solid var(--linha);
    color: var(--tinta);
    transition: color var(--transicao);
  }
  a.contato-info-linha:hover{ color: var(--royal); }
  .contato-info-lista .contato-info-linha:last-child{ border-bottom: none; }
  .contato-info-rotulo{
    font-size: 0.78rem;
    color: var(--tinta-suave);
  }
  .contato-info-valor{
    font-weight: 600;
    font-size: 0.95rem;
    text-align: right;
  }

  .campo{ margin-bottom: 20px; }
  .campo label{
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: var(--tinta-suave);
  }
  .campo input,
  .campo textarea{
    width: 100%;
    padding: 14px 16px;
    border-radius: var(--raio-pequeno);
    border: 1.5px solid var(--linha);
    background: var(--creme);
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--tinta);
    resize: vertical;
  }
  .campo input:focus,
  .campo textarea:focus{
    border-color: var(--royal);
    outline: none;
  }
  .form-botao{
    width: 100%;
    justify-content: center;
    border: none;
  }
  .form-confirmacao{
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(0,73,164,0.08);
    border: 1px solid var(--royal);
    border-radius: var(--raio-pequeno);
    color: var(--royal-escuro);
    font-size: 0.9rem;
    font-weight: 600;
  }
  .form-confirmacao.mostrar{ display: block; }

  /* ==========================================================
     8. RODAPÉ
     ========================================================== */
  .rodape{
    background: var(--tinta);
    color: rgba(243,238,233,0.72);
    padding: 56px 0 30px;
  }
  .rodape-topo{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 24px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(243,238,233,0.14);
    margin-bottom: 24px;
  }
  .rodape-logo{

/* ================================================================
   RENDERIZAÇÃO DO CONTEÚDO
   A partir daqui o código lê TEXTOS/DADOS acima e monta a página.
   Não é necessário editar nada abaixo para trocar textos ou dados.
   ================================================================ */
let idiomaAtual = "pt";
function T(){ return TEXTOS[idiomaAtual]; }
let categoriaAtiva = "todos";
let observador;

function renderCabecalho(){
  const t = T();
  document.getElementById("logo-cabecalho").innerHTML =
    DADOS.nomeCompleto.split(" ")[0] + " <em>" + DADOS.nomeCompleto.split(" ").slice(1).join(" ") + "</em>";

  const menu = document.getElementById("menu-links");
  menu.innerHTML =
    '<li><a href="#sobre">' + t.nav.sobre + '</a></li>' +
    '<li><a href="#portfolio-videos">' + t.nav.portfolio + '</a></li>' +
    '<li><a href="#servicos">' + t.nav.servicos + '</a></li>' +
    '<li class="idioma-item">' +
      '<div class="idioma-toggle" role="group" aria-label="Idioma do site">' +
        '<button type="button" class="idioma-btn' + (idiomaAtual === "pt" ? " ativo" : "") + '" data-lang="pt" aria-pressed="' + (idiomaAtual === "pt") + '">PT</button>' +
        '<button type="button" class="idioma-btn' + (idiomaAtual === "en" ? " ativo" : "") + '" data-lang="en" aria-pressed="' + (idiomaAtual === "en") + '">EN</button>' +
      '</div>' +
    '</li>' +
    '<li><a href="#contato" class="nav-cta">' + t.nav.cta + '</a></li>';

  menu.querySelectorAll(".idioma-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      if(btn.dataset.lang !== idiomaAtual){
        idiomaAtual = btn.dataset.lang;
        renderTudo();
      }
    });
  });

  const botaoMenu = document.getElementById("botao-menu");
  menu.querySelectorAll("a").forEach(function(link){
    link.addEventListener("click", function(){
      menu.classList.remove("aberto");
      botaoMenu.setAttribute("aria-expanded", "false");
      botaoMenu.setAttribute("aria-label", t.nav.abrirMenu);
    });
  });
}

function renderSobre(){

function renderPortfolioVideos(){
  const t = T();
  document.getElementById("portfolio-videos-eyebrow").textContent = t.portfolioVideos.eyebrow;
  document.getElementById("portfolio-videos-titulo").innerHTML =
    t.portfolioVideos.tituloAntes + "<em>" + t.portfolioVideos.tituloDestaque + "</em>" + t.portfolioVideos.tituloDepois;
  document.getElementById("portfolio-videos-texto").textContent = t.portfolioVideos.texto;

  const ordemCategorias = ["todos", "beleza", "moda", "outros"];
  const filtrosEl = document.getElementById("filtros-videos");
  const gradeEl = document.getElementById("grade-videos");

  filtrosEl.innerHTML = ordemCategorias.map(cat =>
    '<button type="button" class="filtro-botao' + (cat === categoriaAtiva ? " ativo" : "") + '" data-categoria="' + cat + '" aria-pressed="' + (cat === categoriaAtiva) + '">' + t.portfolioVideos.categorias[cat] + '</button>'
  ).join("");

  filtrosEl.onclick = function(e){
    const botao = e.target.closest(".filtro-botao");
    if(!botao) return;
    categoriaAtiva = botao.dataset.categoria;
    renderPortfolioVideos();
  };

  gradeEl.innerHTML = PORTFOLIO_VIDEOS.map(item => {
    const oculto = categoriaAtiva !== "todos" && item.categoria !== categoriaAtiva;
    const titulo = idiomaAtual === "pt" ? item.tituloPt : item.tituloEn;
    const categoriaLabel = t.portfolioVideos.categorias[item.categoria];
    return '<article class="cartao-trabalho revelar' + (oculto ? " oculto" : "") + '" data-categoria="' + item.categoria + '">' +
      '<div class="cartao-trabalho-imagem">' +
        '<span class="cartao-trabalho-tag">' + categoriaLabel + '</span>' +
        '<iframe class="cartao-trabalho-video" src="https://www.youtube.com/embed/' + item.id + '" title="' + titulo + '" loading="lazy" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>' +
      '</div>' +
      '<div class="cartao-trabalho-legenda">' +
        '<h3 class="cartao-trabalho-titulo">' + titulo + '</h3>' +
        '<a class="cartao-trabalho-link-externo" href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + t.portfolioVideos.assistir + ' ↗</a>' +
      '</div>' +
    '</article>';
  }).join("");
}

function revelarNovos(){
  if(!observador) return;
  document.querySelectorAll(".revelar:not(.visivel)").forEach(el => observador.observe(el));
}

function renderTudo(){
  document.documentElement.lang = idiomaAtual === "pt" ? "pt-BR" : "en";
  renderCabecalho();
  renderHero();
  renderSobre();
  renderPortfolioVideos();
  renderPortfolioFotos();
  renderServicos();
  renderContato();
  renderRodape();
  revelarNovos();
}

/* ================================================================
   ANIMAÇÃO DE ENTRADA AO ROLAR (IntersectionObserver)
   Configurada antes da primeira renderização, para observar também
   os cartões criados dinamicamente pelo primeiro renderTudo().
   ================================================================ */
(function(){
  if(!("IntersectionObserver" in window)){
    observador = null;
    renderTudo();
    document.querySelectorAll(".revelar").forEach(el => el.classList.add("visivel"));
    return;
  }
  observador = new IntersectionObserver((entradas) => {
    entradas.forEach(entrada => {
      if(entrada.isIntersecting){
        entrada.target.classList.add("visivel");
        observador.unobserve(entrada.target);
      }
    });
  }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });

  renderTudo();
})();

(function(){
  const botaoMenu = document.getElementById("botao-menu");
  const menuLinks = document.getElementById("menu-links");

  botaoMenu.addEventListener("click", function(){
    const aberto = menuLinks.classList.toggle("aberto");
    botaoMenu.setAttribute("aria-expanded", aberto ? "true" : "false");
    botaoMenu.setAttribute("aria-label", aberto ? T().nav.fecharMenu : T().nav.abrirMenu);
  });
})();

/* ================================================================
   FORMULÁRIO DE CONTATO (mailto + confirmação na tela)
   ================================================================ */
(function(){
  const formulario = document.getElementById("formulario-contato");
  const confirmacao = document.getElementById("form-confirmacao");

  formulario.addEventListener("submit", function(e){
    e.preventDefault();
    const t = T().contato;

    const nome = document.getElementById("campo-nome").value.trim();
    const email = document.getElementById("campo-email").value.trim();
    const mensagem = document.getElementById("campo-mensagem").value.trim();

    if(!nome || !email || !mensagem){
      confirmacao.textContent = t.msgErro;
      confirmacao.classList.add("mostrar");
      return;
    }

    const assunto = encodeURIComponent(t.assunto + ", " + nome);
    const corpo = encodeURIComponent(
      "Nome: " + nome + "\nE-mail: " + email + "\n\nMensagem:\n" + mensagem
    );
    const linkMailto = "mailto:" + DADOS.email + "?subject=" + assunto + "&body=" + corpo;

    window.location.href = linkMailto;

    confirmacao.textContent = t.msgOk + DADOS.email + ".";
    confirmacao.classList.add("mostrar");
    formulario.reset();
  });
})();
</script>
